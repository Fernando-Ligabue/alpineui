<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlpineUI - Components Examples</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- AlpineUI Components -->
  <script src="../packages/ui/button/button.js"></script>
  <script src="../packages/ui/input/input.js"></script>
  
  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  
  <!-- AlpineUI Styles -->
  <style>
    :root {
      --au-background: #ffffff;
      --au-foreground: #0a0a0a;
      --au-primary: #0a0a0a;
      --au-primary-foreground: #ffffff;
      --au-secondary: #f5f5f5;
      --au-secondary-foreground: #0a0a0a;
      --au-muted: #f5f5f5;
      --au-muted-foreground: #737373;
      --au-accent: #f5f5f5;
      --au-accent-foreground: #0a0a0a;
      --au-destructive: #ef4444;
      --au-destructive-foreground: #ffffff;
      --au-border: #e5e5e5;
      --au-ring: #0a0a0a;
      --au-ring-alpha: rgba(10, 10, 10, 0.1);
      --au-radius: 0.5rem;
    }
  </style>
  
  <!-- Component Styles -->
  <link rel="stylesheet" href="../packages/ui/button/index.css">
  <link rel="stylesheet" href="../packages/ui/input/index.css">
  
  <!-- Utility Classes -->
  <style>
    .border { border-width: 1px; border-style: solid; }
    .border-border { border-color: var(--au-border); }
    .bg-background { background-color: var(--au-background); }
    .text-foreground { color: var(--au-foreground); }
    .bg-white { background-color: white; }
    .bg-gray-50 { background-color: #f9afb; }
    .text-gray-900 { color: #111827; }
    .text-gray-600 { color: #4b5563; }
    .rounded-lg { border-radius: 0.5rem; }
    .shadow-sm { box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); }
    .max-w-4xl { max-width: 56rem; }
    .mx-auto { margin-left: auto; margin-right: auto; }
    .space-y-12 > * + * { margin-top: 3rem; }
    .gap-4 { gap: 1rem; }
    .gap-2 { gap: 0.5rem; }
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .flex-wrap { flex-wrap: wrap; }
    .items-center { align-items: center; }
    .items-start { align-items: flex-start; }
    .justify-start { justify-content: flex-start; }
    .p-6 { padding: 1.5rem; }
    .p-4 { padding: 1rem; }
    .mb-2 { margin-bottom: 0.5rem; }
    .mb-4 { margin-bottom: 1rem; }
    .mb-6 { margin-bottom: 1.5rem; }
    .min-h-screen { min-height: 100vh; }
    .p-8 { padding: 2rem; }
    .font-bold { font-weight: 700; }
    .font-semibold { font-weight: 600; }
    .text-4xl { font-size: 2.25rem; line-height: 2.5rem; }
    .text-xl { font-size: 1.25rem; line-height: 1.75rem; }
    .text-sm { font-size: 0.875rem; line-height: 1.25rem; }
    .w-full { width: 100%; }
    .max-w-md { max-width: 28rem; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 p-8">
  <div class="max-w-4xl mx-auto">
    <header class="mb-12">
      <h1 class="text-4xl font-bold text-gray-900 mb-2">AlpineUI</h1>
      <p class="text-gray-600">Component Library for Alpine.js</p>
    </header>
    
    <main class="space-y-12">
      <!-- ===== BUTTON SECTION ===== -->
      <section>
        <h2 class="text-xl font-semibold mb-4">Button Component</h2>
        
        <!-- Variants -->
        <div class="mb-6">
          <h3 class="text-sm font-semibold mb-2 text-gray-600">Variants</h3>
          <div class="flex flex-wrap gap-4 p-4 bg-white rounded-lg shadow-sm border">
            <button x-data="button" class="au-button au-button-md au-button-default">Default</button>
            <button x-data="button" class="au-button au-button-md au-button-destructive">Destructive</button>
            <button x-data="button" class="au-button au-button-md au-button-outline">Outline</button>
            <button x-data="button" class="au-button au-button-md au-button-secondary">Secondary</button>
            <button x-data="button" class="au-button au-button-md au-button-ghost">Ghost</button>
            <button x-data="button" class="au-button au-button-md au-button-link">Link</button>
          </div>
        </div>
        
        <!-- Sizes -->
        <div class="mb-6">
          <h3 class="text-sm font-semibold mb-2 text-gray-600">Sizes</h3>
          <div class="flex items-center gap-4 p-4 bg-white rounded-lg shadow-sm border">
            <button x-data="button" class="au-button au-button-sm au-button-default">Small</button>
            <button x-data="button" class="au-button au-button-md au-button-default">Medium</button>
            <button x-data="button" class="au-button au-button-lg au-button-default">Large</button>
            <button x-data="button" class="au-button au-button-md au-button-icon au-button-default">Icon</button>
          </div>
        </div>
        
        <!-- States -->
        <div>
          <h3 class="text-sm font-semibold mb-2 text-gray-600">States</h3>
          <div class="flex flex-wrap gap-4 p-4 bg-white rounded-lg shadow-sm border">
            <button x-data="button" class="au-button au-button-md au-button-default">Normal</button>
            <button x-data="button" class="au-button au-button-md au-button-default" disabled>Disabled</button>
          </div>
        </div>
      </section>
      
      <!-- ===== INPUT SECTION ===== -->
      <section>
        <h2 class="text-xl font-semibold mb-4">Input Component</h2>
        
        <!-- Basic Inputs -->
        <div class="mb-6">
          <h3 class="text-sm font-semibold mb-2 text-gray-600">Basic Inputs</h3>
          <div class="flex flex-col gap-4 p-4 bg-white rounded-lg shadow-sm border">
            <div class="au-field">
              <label class="au-label">Text</label>
              <input x-data="input" type="text" class="au-input au-input-md" placeholder="Enter text..." />
            </div>
            <div class="au-field">
              <label class="au-label">Email</label>
              <input x-data="input" type="email" class="au-input au-input-md" placeholder="email@example.com" />
            </div>
            <div class="au-field">
              <label class="au-label">Password</label>
              <input x-data="input" type="password" class="au-input au-input-md" placeholder="Enter password..." />
            </div>
            <div class="au-field">
              <label class="au-label">Number</label>
              <input x-data="input" type="number" class="au-input au-input-md" placeholder="0" />
            </div>
          </div>
        </div>
        
        <!-- Input Sizes -->
        <div class="mb-6">
          <h3 class="text-sm font-semibold mb-2 text-gray-600">Sizes</h3>
          <div class="flex flex-col gap-4 p-4 bg-white rounded-lg shadow-sm border">
            <input x-data="input" type="text" class="au-input au-input-sm" placeholder="Small input" />
            <input x-data="input" type="text" class="au-input au-input-md" placeholder="Medium input" />
            <input x-data="input" type="text" class="au-input au-input-lg" placeholder="Large input" />
          </div>
        </div>
        
        <!-- Input with Icons -->
        <div class="mb-6">
          <h3 class="text-sm font-semibold mb-2 text-gray-600">With Icons</h3>
          <div class="flex flex-col gap-4 p-4 bg-white rounded-lg shadow-sm border">
            <div class="au-input-wrapper">
              <span class="au-input-icon au-input-icon-left">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              </span>
              <input x-data="input" type="search" class="au-input au-input-md au-input-icon-left" placeholder="Search..." />
            </div>
            <div class="au-input-wrapper">
              <input x-data="input" type="email" class="au-input au-input-md au-input-icon-right" placeholder="email@example.com" />
              <span class="au-input-icon au-input-icon-right">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              </span>
            </div>
          </div>
        </div>
        
        <!-- Validation States -->
        <div class="mb-6">
          <h3 class="text-sm font-semibold mb-2 text-gray-600">Validation States</h3>
          <div class="flex flex-col gap-4 p-4 bg-white rounded-lg shadow-sm border">
            <div class="au-field">
              <label class="au-label">Required Field</label>
              <input x-data="input" type="text" class="au-input au-input-md" required />
              <span class="au-input-helper">This field is required</span>
            </div>
            <div class="au-field">
              <label class="au-label">Email Validation</label>
              <input x-data="input" type="email" class="au-input au-input-md" placeholder="Enter valid email..." />
            </div>
            <div class="au-field">
              <label class="au-label">With Error</label>
              <input x-data="input" type="text" class="au-input au-input-md au-input-error" value="Invalid" @input="$event.target.__x.$data.setError('This is an error message')" />
              <span class="au-input-error-message">This field has an error</span>
            </div>
            <div class="au-field">
              <label class="au-label">Disabled</label>
              <input x-data="input" type="text" class="au-input au-input-md" value="Disabled input" disabled />
            </div>
            <div class="au-field">
              <label class="au-label">Readonly</label>
              <input x-data="input" type="text" class="au-input au-input-md" value="Readonly input" readonly />
            </div>
          </div>
        </div>
        
        <!-- Textarea -->
        <div class="mb-6">
          <h3 class="text-sm font-semibold mb-2 text-gray-600">Textarea</h3>
          <div class="p-4 bg-white rounded-lg shadow-sm border">
            <div class="au-field">
              <label class="au-label">Message</label>
              <textarea x-data="input" class="au-textarea au-textarea-md" rows="4" placeholder="Enter your message..."></textarea>
              <span class="au-input-helper">Max 500 characters</span>
            </div>
          </div>
        </div>
        
        <!-- Input with Addons -->
        <div class="mb-6">
          <h3 class="text-sm font-semibold mb-2 text-gray-600">With Addons</h3>
          <div class="flex flex-col gap-4 p-4 bg-white rounded-lg shadow-sm border">
            <div class="au-input-wrapper au-input-with-addon-left">
              <span class="au-input-addon au-input-addon-left">https://</span>
              <input x-data="input" type="url" class="au-input au-input-md" placeholder="website.com" />
            </div>
            <div class="au-input-wrapper au-input-with-addon-right">
              <input x-data="input" type="email" class="au-input au-input-md" placeholder="username" />
              <span class="au-input-addon au-input-addon-right">@example.com</span>
            </div>
          </div>
        </div>
        
        <!-- Input Group -->
        <div>
          <h3 class="text-sm font-semibold mb-2 text-gray-600">Input Group</h3>
          <div class="p-4 bg-white rounded-lg shadow-sm border" x-data="inputGroup">
            <div class="au-input-group">
              <button 
                type="button" 
                class="au-input-group-item"
                :class="{ 'au-input-group-item-active': selectedValue === 'week' }"
                @click="select('week')"
              >Week</button>
              <button 
                type="button" 
                class="au-input-group-item"
                :class="{ 'au-input-group-item-active': selectedValue === 'month' }"
                @click="select('month')"
              >Month</button>
              <button 
                type="button" 
                class="au-input-group-item"
                :class="{ 'au-input-group-item-active': selectedValue === 'year' }"
                @click="select('year')"
              >Year</button>
            </div>
            <p class="text-sm text-gray-600 mt-2">Selected: <span x-text="selectedValue" class="font-semibold"></span></p>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
