<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlpineUI - Button Example</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- AlpineUI Button Component -->
  <script src="../packages/ui/button/button.js"></script>
  
  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  
  <!-- AlpineUI Styles -->
  <style>
    :root {
      --au-background: #ffffff;
      --au-foreground: #0a0a0a;
      --au-primary: #0a0a0a;
      --au-primary-foreground: #ffffff;
      --au-secondary: #f5f5f5;
      --au-secondary-foreground: #0a0a0a;
      --au-muted: #f5f5f5;
      --au-muted-foreground: #737373;
      --au-accent: #f5f5f5;
      --au-accent-foreground: #0a0a0a;
      --au-destructive: #ef4444;
      --au-destructive-foreground: #ffffff;
      --au-border: #e5e5e5;
      --au-ring: #0a0a0a;
      --au-radius: 0.5rem;
    }
  </style>
  
  <!-- Component Styles -->
  <link rel="stylesheet" href="../packages/ui/button/index.css">
  
  <!-- Utility Classes -->
  <style>
    .border { border-width: 1px; border-style: solid; }
    .border-border { border-color: var(--au-border); }
    .bg-background { background-color: var(--au-background); }
    .text-foreground { color: var(--au-foreground); }
    .bg-white { background-color: white; }
    .bg-gray-50 { background-color: #f9fafb; }
    .text-gray-900 { color: #111827; }
    .text-gray-600 { color: #4b5563; }
    .rounded-lg { border-radius: 0.5rem; }
    .shadow-sm { box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); }
    .max-w-4xl { max-width: 56rem; }
    .mx-auto { margin-left: auto; margin-right: auto; }
    .space-y-12 > * + * { margin-top: 3rem; }
    .gap-4 { gap: 1rem; }
    .flex { display: flex; }
    .flex-wrap { flex-wrap: wrap; }
    .items-center { align-items: center; }
    .p-6 { padding: 1.5rem; }
    .mb-2 { margin-bottom: 0.5rem; }
    .mb-4 { margin-bottom: 1rem; }
    .min-h-screen { min-height: 100vh; }
    .p-8 { padding: 2rem; }
    .font-bold { font-weight: 700; }
    .font-semibold { font-weight: 600; }
    .text-4xl { font-size: 2.25rem; line-height: 2.5rem; }
    .text-xl { font-size: 1.25rem; line-height: 1.75rem; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 p-8">
  <div class="max-w-4xl mx-auto">
    <header class="mb-12">
      <h1 class="text-4xl font-bold text-gray-900 mb-2">AlpineUI</h1>
      <p class="text-gray-600">Button Component Examples</p>
    </header>
    
    <main class="space-y-12">
      <!-- Variants -->
      <section>
        <h2 class="text-xl font-semibold mb-4">Variants</h2>
        <div class="flex flex-wrap gap-4 p-6 bg-white rounded-lg shadow-sm border">
          <button x-data="button" class="au-button au-button-md au-button-default">
            Default
          </button>
          <button x-data="button" class="au-button au-button-md au-button-destructive">
            Destructive
          </button>
          <button x-data="button" class="au-button au-button-md au-button-outline">
            Outline
          </button>
          <button x-data="button" class="au-button au-button-md au-button-secondary">
            Secondary
          </button>
          <button x-data="button" class="au-button au-button-md au-button-ghost">
            Ghost
          </button>
          <button x-data="button" class="au-button au-button-md au-button-link">
            Link
          </button>
        </div>
      </section>
      
      <!-- Sizes -->
      <section>
        <h2 class="text-xl font-semibold mb-4">Sizes</h2>
        <div class="flex items-center gap-4 p-6 bg-white rounded-lg shadow-sm border">
          <button x-data="button" class="au-button au-button-sm au-button-default">
            Small
          </button>
          <button x-data="button" class="au-button au-button-md au-button-default">
            Medium
          </button>
          <button x-data="button" class="au-button au-button-lg au-button-default">
            Large
          </button>
          <button x-data="button" class="au-button au-button-md au-button-icon au-button-default">
            Icon
          </button>
        </div>
      </section>
      
      <!-- States -->
      <section>
        <h2 class="text-xl font-semibold mb-4">States</h2>
        <div class="flex flex-wrap gap-4 p-6 bg-white rounded-lg shadow-sm border">
          <button x-data="button" class="au-button au-button-md au-button-default">
            Normal
          </button>
          <button x-data="button" class="au-button au-button-md au-button-default" disabled>
            Disabled
          </button>
        </div>
      </section>
      
      <!-- Interactive Example -->
      <section x-data="{ count: 0 }">
        <h2 class="text-xl font-semibold mb-4">Interactive Example</h2>
        <div class="p-6 bg-white rounded-lg shadow-sm border">
          <p class="mb-4 text-gray-600">Counter: <span x-text="count" class="font-bold"></span></p>
          <button 
            x-data="button"
            class="au-button au-button-md au-button-default"
            @click="count++"
          >
            Increment
          </button>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
